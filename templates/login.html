{% extends "base.html" %}

{% block login_content %}
<div id="loginPage" class="login-container">
    <div class="login-box">

        <!-- Header -->
        <div class="login-header">
            <div class="main-logo">
                <i class="fas fa-clinic-medical"></i>
            </div>

            <h1>{{ t('العيادة الرقمية') }}</h1>
            <p>{{ t('نظام ذكي لإدارة الرعاية الصحية') }}</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}">

            <!-- Username -->
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i>
                    {{ t('اسم المستخدم') }}
                </label>

                <input 
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="{{ t('أدخل اسم المستخدم') }}"
                    required
                >
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    {{ t('كلمة المرور') }}
                </label>

                <input 
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="{{ t('أدخل كلمة المرور') }}"
                    required
                >
            </div>

            <!-- Role is determined automatically by the system based on Admin assignment -->

            <!-- Login Button -->
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i>
                {{ t('تسجيل الدخول') }}
            </button>

        </form>
    </div>
</div>

<!-- Styles -->
<style>

.login-container{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at top left, rgba(15, 138, 112, 0.08), transparent 28%),
                radial-gradient(circle at top right, rgba(217, 108, 72, 0.08), transparent 24%),
                var(--bg, #f4f6f8);
    padding:20px;
}

.login-box{
    width:100%;
    max-width:440px;
    background:rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(191, 208, 203, 0.75);
    border-radius: 28px;
    padding:44px 38px;
    box-shadow: 0 22px 48px rgba(22, 33, 31, 0.1);
    animation:fadeIn 0.5s ease;
}

.login-header{
    text-align:center;
    margin-bottom:35px;
}

.main-logo{
    width:90px;
    height:90px;
    margin:0 auto 20px;
    border-radius:24px;
    background:linear-gradient(135deg, var(--primary, #0f8a70), var(--secondary, #2d5b8a));
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:38px;
    box-shadow: 0 10px 24px rgba(15, 138, 112, 0.25);
}

.login-header h1{
    font-size:32px;
    font-weight:800;
    color:var(--text, #16211f);
    margin-bottom:8px;
    line-height: 1.2;
}

.login-header p{
    color:var(--muted, #5e6e69);
    font-size:15px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:flex;
    align-items:center;
    gap: 8px;
    margin-bottom:10px;
    font-weight:700;
    color:var(--text, #16211f);
}

.form-group label i {
    color: var(--primary, #0f8a70);
}

.form-control{
    width:100%;
    padding:16px 18px;
    border:2px solid var(--stroke, #d7e0de);
    background: var(--surface, #ffffff);
    border-radius:18px;
    font-size:15px;
    transition:0.3s;
}

.form-control:focus{
    border-color:var(--primary, #0f8a70);
    outline:none;
    box-shadow:0 0 0 4px rgba(15, 138, 112, 0.15);
}

.role-title{
    margin-bottom:15px;
}

.role-selector{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.role-option{
    border:2px solid #e2e8f0;
    border-radius:16px;
    padding:18px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    background:#f8fafc;
}

.role-option:hover{
    transform:translateY(-3px);
    border-color:#2563eb;
}

.role-option.selected{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    border-color:#2563eb;
}

.role-option input{
    display:none;
}

.role-option i{
    font-size:28px;
    margin-bottom:10px;
    display:block;
}

.role-option span{
    font-size:14px;
    font-weight:600;
}

.btn-login{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg, var(--primary, #0f8a70), #13b18f);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
}

.btn-login:hover{
    transform:translateY(-2px);
    box-shadow: 0 14px 28px rgba(15, 138, 112, 0.25);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){

    .login-box{
        padding:30px 20px;
    }

    .role-selector{
        grid-template-columns:1fr;
    }

    .login-header h1{
        font-size:28px;
    }
}

</style>

<!-- Script -->
<script>
<!-- Removed role selector script --></script>

{% endblock %}
