{% extends "base.html" %}

{% block login_content %}
<div id="loginPage" class="login-container">
    <div class="login-box">

        <!-- Header -->
        <div class="login-header">
            <div class="main-logo">
                <i class="fas fa-clinic-medical"></i>
            </div>

            <h1>Digital Clinic</h1>
            <p>Smart Healthcare Management System</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}">

            <!-- Username -->
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i>
                    اسم المستخدم
                </label>

                <input 
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="أدخل اسم المستخدم"
                    required
                >
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    كلمة المرور
                </label>

                <input 
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="أدخل كلمة المرور"
                    required
                >
            </div>

            <!-- Role Selection -->
            <div class="form-group">
                <label class="role-title">
                    <i class="fas fa-users"></i>
                    اختر دور المستخدم
                </label>

                <div class="role-selector">

                    <!-- Admin -->
                    <label class="role-option {% if request.form.get('role') == 'admin' or not request.form.get('role') %}selected{% endif %}">
                        <input 
                            type="radio"
                            name="role"
                            value="admin"
                            {% if request.form.get('role') == 'admin' or not request.form.get('role') %}checked{% endif %}
                        >

                        <i class="fas fa-user-shield"></i>
                        <span>مدير النظام</span>
                    </label>

                    <!-- Doctor -->
                    <label class="role-option {% if request.form.get('role') == 'doctor' %}selected{% endif %}">
                        <input 
                            type="radio"
                            name="role"
                            value="doctor"
                            {% if request.form.get('role') == 'doctor' %}checked{% endif %}
                        >

                        <i class="fas fa-user-md"></i>
                        <span>طبيب</span>
                    </label>

                    <!-- Nurse -->
                    <label class="role-option {% if request.form.get('role') == 'nurse' %}selected{% endif %}">
                        <input 
                            type="radio"
                            name="role"
                            value="nurse"
                            {% if request.form.get('role') == 'nurse' %}checked{% endif %}
                        >

                        <i class="fas fa-user-nurse"></i>
                        <span>ممرض / ممرضة</span>
                    </label>

                    <!-- Viewer -->
                    <label class="role-option {% if request.form.get('role') == 'view' %}selected{% endif %}">
                        <input 
                            type="radio"
                            name="role"
                            value="view"
                            {% if request.form.get('role') == 'view' %}checked{% endif %}
                        >

                        <i class="fas fa-eye"></i>
                        <span>مشاهد فقط</span>
                    </label>

                </div>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i>
                تسجيل الدخول
            </button>

            <!-- Demo Accounts -->
            <div class="demo-box">
                <h4>
                    <i class="fas fa-info-circle"></i>
                    بيانات تجريبية
                </h4>

                <p><strong>مدير النظام:</strong> admin / admin123</p>
                <p><strong>طبيب:</strong> doctor1 / doctor123</p>
                <p><strong>ممرض:</strong> nurse1 / nurse123</p>
            </div>

        </form>
    </div>
</div>

<!-- Styles -->
<style>

.login-container{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    padding:20px;
}

.login-box{
    width:100%;
    max-width:500px;
    background:#ffffff;
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    animation:fadeIn 0.5s ease;
}

.login-header{
    text-align:center;
    margin-bottom:35px;
}

.main-logo{
    width:100px;
    height:100px;
    margin:0 auto 20px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:42px;
    box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

.login-header h1{
    font-size:34px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:10px;
}

.login-header p{
    color:#64748b;
    font-size:15px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    color:#1e293b;
}

.form-control{
    width:100%;
    padding:14px 16px;
    border:2px solid #e2e8f0;
    border-radius:14px;
    font-size:15px;
    transition:0.3s;
}

.form-control:focus{
    border-color:#2563eb;
    outline:none;
    box-shadow:0 0 0 4px rgba(37,99,235,0.15);
}

.role-title{
    margin-bottom:15px;
}

.role-selector{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.role-option{
    border:2px solid #e2e8f0;
    border-radius:16px;
    padding:18px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    background:#f8fafc;
}

.role-option:hover{
    transform:translateY(-3px);
    border-color:#2563eb;
}

.role-option.selected{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    border-color:#2563eb;
}

.role-option input{
    display:none;
}

.role-option i{
    font-size:28px;
    margin-bottom:10px;
    display:block;
}

.role-option span{
    font-size:14px;
    font-weight:600;
}

.btn-login{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.btn-login:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(37,99,235,0.3);
}

.demo-box{
    margin-top:30px;
    background:#f8fafc;
    border-radius:16px;
    padding:18px;
    border:1px solid #e2e8f0;
}

.demo-box h4{
    margin-bottom:12px;
    color:#0f172a;
}

.demo-box p{
    margin:6px 0;
    color:#475569;
    font-size:14px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){

    .login-box{
        padding:30px 20px;
    }

    .role-selector{
        grid-template-columns:1fr;
    }

    .login-header h1{
        font-size:28px;
    }
}

</style>

<!-- Script -->
<script>

document.querySelectorAll('.role-option').forEach(option => {

    option.addEventListener('click', function () {

        document.querySelectorAll('.role-option')
            .forEach(el => el.classList.remove('selected'));

        this.classList.add('selected');

        this.querySelector('input').checked = true;
    });

});

</script>

{% endblock %}
