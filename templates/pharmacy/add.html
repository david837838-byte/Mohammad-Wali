{% extends "base.html" %}

{% block title %}إضافة دواء جديد{% endblock %}

{% block content %}
<div class="content-header">
    <h2><i class="fas fa-plus"></i> {{ t('إضافة دواء جديد') }}</h2>
    <div class="header-actions">
        <a href="{{ url_for('pharmacy.index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-right"></i> {{ t('عودة للصيدلية') }}
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('pharmacy.add') }}" class="form">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="name">{{ t('اسم الدواء *') }}</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="category">{{ t('التصنيف') }}</label>
                    <input type="text" id="category" name="category" class="form-control">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group col-md-4">
                    <label for="stock">{{ t('الكمية *') }}</label>
                    <input type="number" id="stock" name="stock" class="form-control" required min="0">
                </div>
                <div class="form-group col-md-4">
                    <label for="price">{{ t('السعر ($) *') }}</label>
                    <input type="number" id="price" name="price" class="form-control" required min="0" step="0.01">
                </div>
                <div class="form-group col-md-4">
                    <label for="expiry_date">{{ t('تاريخ الانتهاء') }}</label>
                    <input type="date" id="expiry_date" name="expiry_date" class="form-control">
                </div>
            </div>
            
            <div class="form-actions mt-4">
                <button type="submit" class="btn btn-primary">{{ t('حفظ الدواء') }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
