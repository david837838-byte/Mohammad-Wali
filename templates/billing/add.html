{% extends "base.html" %}

{% block title %}إنشاء فاتورة جديدة{% endblock %}

{% block content %}
<div class="content-header">
    <h2><i class="fas fa-plus"></i> {{ t('إنشاء فاتورة جديدة') }}</h2>
    <div class="header-actions">
        <a href="{{ url_for('billing.index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-right"></i> {{ t('عودة للمالية') }}
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('billing.add') }}" class="form">
            <div class="form-row">
                <div class="form-group col-md-12">
                    <label for="patient_id">{{ t('المريض *') }}</label>
                    <select id="patient_id" name="patient_id" class="form-control" required>
                        <option value="">{{ t('اختر المريض') }}</option>
                        {% for patient in current_user.patients_list %}
                        <option value="{{ patient.id }}">{{ patient.name }} - {{ patient.file_number }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group col-md-4">
                    <label for="total_amount">{{ t('الإجمالي ($) *') }}</label>
                    <input type="number" id="total_amount" name="total_amount" class="form-control" required min="0" step="0.01">
                </div>
                <div class="form-group col-md-4">
                    <label for="paid_amount">{{ t('المبلغ المدفوع ($)') }}</label>
                    <input type="number" id="paid_amount" name="paid_amount" class="form-control" value="0" min="0" step="0.01">
                </div>
                <div class="form-group col-md-4">
                    <label for="status">{{ t('الحالة') }}</label>
                    <select id="status" name="status" class="form-control">
                        <option value="غير مدفوع">{{ t('غير مدفوع') }}</option>
                        <option value="مدفوع جزئياً">{{ t('مدفوع جزئياً') }}</option>
                        <option value="مدفوع">{{ t('مدفوع') }}</option>
                    </select>
                </div>
            </div>
            
            <div class="form-actions mt-4">
                <button type="submit" class="btn btn-primary">{{ t('حفظ الفاتورة') }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
