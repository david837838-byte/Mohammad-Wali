{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                {% if form_type == 'edit' %}
                    تعديل السجل الطبي
                {% else %}
                    إضافة سجل طبي جديد
                {% endif %}
            </h5>
        </div>
        <div class="card-body">
            <form method="POST" action="/medical/save">
                
                <!-- اختيار المريض -->
                <div class="form-group mb-3">
                    <label for="patient_id" class="form-label">المريض *</label>
                    <select class="form-control" id="patient_id" name="patient_id" required>
                        <option value="">-- اختر مريضاً --</option>
                        {% for patient in patients %}
                            <option value="{{ patient.id }}" 
                                {% if form_type == 'edit' and medical.patient_id == patient.id %}selected{% endif %}>
                                {{ patient.name }} ({{ patient.file_number }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- التشخيص -->
                <div class="form-group mb-3">
                    <label for="diagnosis" class="form-label">التشخيص *</label>
                    <textarea class="form-control" id="diagnosis" name="diagnosis" rows="3" placeholder="أدخل التشخيص الطبي" required>
                        {% if form_type == 'edit' %}{{ medical.diagnosis }}{% endif %}
                    </textarea>
                </div>

                <!-- العلاج -->
                <div class="form-group mb-3">
                    <label for="treatment" class="form-label">العلاج *</label>
                    <textarea class="form-control" id="treatment" name="treatment" rows="3" placeholder="أدخل العلاج الموصوف" required>
                        {% if form_type == 'edit' %}{{ medical.treatment }}{% endif %}
                    </textarea>
                </div>

                <!-- الملاحظات -->
                <div class="form-group mb-3">
                    <label for="notes" class="form-label">الملاحظات</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="ملاحظات إضافية (اختياري)">
                        {% if form_type == 'edit' %}{{ medical.notes }}{% endif %}
                    </textarea>
                </div>

                <!-- التاريخ -->
                {% if form_type == 'edit' %}
                <div class="form-group mb-3">
                    <label for="record_date" class="form-label">تاريخ السجل</label>
                    <input type="date" class="form-control" id="record_date" value="{% if medical.created_at %}{{ medical.created_at|date_format('%Y-%m-%d') }}{% endif %}" disabled>
                    <small class="text-muted">تاريخ الإنشاء الأصلي</small>
                </div>
                {% endif %}

                <!-- الأزرار -->
                <div class="form-group">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i>
                        {% if form_type == 'edit' %}حفظ التعديلات{% else %}إضافة{% endif %}
                    </button>
                    <a href="/medical" class="btn btn-secondary">
                        <i class="fas fa-times"></i>
                        إلغاء
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
