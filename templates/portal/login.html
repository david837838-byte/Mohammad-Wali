<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('بوابة المريض - تسجيل الدخول') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2><i class="fas fa-user-injured text-primary"></i> {{ t('بوابة المريض') }}</h2>
        <p class="text-muted">{{ t('الرجاء إدخال رقم الملف الطبي للوصول لبياناتك') }}</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('portal.login') }}">
            <div class="form-group" style="text-align: right;">
                <label>{{ t('رقم الملف') }}</label>
                <input type="text" name="file_number" class="form-control" placeholder="PT-2024-..." required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">{{ t('تسجيل الدخول') }}</button>
        </form>
    </div>
</body>
</html>
