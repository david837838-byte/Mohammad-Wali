{% extends "base.html" %}

{% block title %}{{ 'تعديل' if patient else 'إضافة' }} مريض - بيت المسيح{% endblock %}

{% block content %}
<div class="page-content">
    <div class="page-title">
        <h2>{{ 'تعديل' if patient else 'إضافة' }} مريض جديد</h2>
        <a href="{{ url_for('patient.index') }}" class="btn">
            <i class="fas fa-arrow-right"></i> {{ t('رجوع') }}
        </a>
    </div>
    
    <div class="form-container">
        <form method="POST" action="{{ url_for('patient.save') }}">
            {% if patient %}
            <input type="hidden" name="patient_id" value="{{ patient.id }}">
            {% endif %}
            
            <div class="form-row">
                <div class="form-group">
                    <label for="patientName">{{ t('اسم المريض الكامل *') }}</label>
                    <input type="text" id="patientName" name="name" class="form-control" value="{{ patient.name if patient else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="patientAge">{{ t('العمر *') }}</label>
                    <input type="number" id="patientAge" name="age" class="form-control" value="{{ patient.age if patient else '' }}" required min="0" max="150">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="patientPhone">{{ t('رقم الهاتف *') }}</label>
                    <input type="tel" id="patientPhone" name="phone" class="form-control" value="{{ patient.phone if patient else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="patientGender">{{ t('الجنس *') }}</label>
                    <select id="patientGender" name="gender" class="form-control" required>
                        <option value="">{{ t('اختر الجنس') }}</option>
                        <option value="ذكر" {% if patient and patient.gender == 'ذكر' %}selected{% endif %}>{{ t('ذكر') }}</option>
                        <option value="أنثى" {% if patient and patient.gender == 'أنثى' %}selected{% endif %}>{{ t('أنثى') }}</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="patientAddress">{{ t('العنوان *') }}</label>
                <input type="text" id="patientAddress" name="address" class="form-control" value="{{ patient.address if patient else '' }}" required>
            </div>
            
            <div class="form-group">
                <label for="initialDiagnosis">{{ t('التشخيص الأولي') }}</label>
                <textarea id="initialDiagnosis" name="diagnosis" class="form-control" rows="3">{{ patient.diagnosis if patient else '' }}</textarea>
            </div>
            
            <div class="form-group">
                <label for="patientStatus">{{ t('الحالة') }}</label>
                <select id="patientStatus" name="status" class="form-control">
                    <option value="نشط" {% if patient and patient.status == 'نشط' %}selected{% endif %}>{{ t('نشط') }}</option>
                    <option value="بانتظار الفحص" {% if patient and patient.status == 'بانتظار الفحص' %}selected{% endif %}>{{ t('بانتظار الفحص') }}</option>
                    <option value="غير نشط" {% if patient and patient.status == 'غير نشط' %}selected{% endif %}>{{ t('غير نشط') }}</option>
                </select>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> {{ 'تحديث' if patient else 'حفظ' }} المريض
                </button>
                <a href="{{ url_for('patient.index') }}" class="btn" style="background-color: #f1f3f4;">
                    {{ t('إلغاء') }}
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
